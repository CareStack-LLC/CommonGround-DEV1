# Render Blueprint for CommonGround
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: commonground-api
    runtime: docker
    dockerfilePath: ./cg-v1.110.26/backend/Dockerfile
    dockerContext: ./cg-v1.110.26/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: commonground-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://common-ground-blue.vercel.app,https://www.find-commonground.com,https://find-commonground.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: MAPBOX_API_KEY
        sync: false

databases:
  - name: commonground-db
    plan: free
    databaseName: commonground
    user: commonground

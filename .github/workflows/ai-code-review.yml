name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: Claude AI Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: get-diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -l < pr_diff.txt) lines"

      - name: AI Code Review with Claude/OpenAI
        if: secrets.ANTHROPIC_API_KEY != '' || secrets.OPENAI_API_KEY != ''
        id: ai-review
        run: |
          cat > review_prompt.txt << 'EOF'
          You are a senior software engineer reviewing a pull request for CommonGround, a co-parenting platform built with:
          - Frontend: Next.js 14 + TypeScript + Tailwind
          - Backend: FastAPI + Python + PostgreSQL
          - Auth: Supabase

          Review this diff and provide:
          1. Security issues (XSS, SQL injection, auth bypasses)
          2. Type safety issues
          3. Performance concerns
          4. Best practice violations
          5. Positive feedback on good changes

          Be concise and actionable. Focus on critical issues.

          DIFF:
          EOF

          cat pr_diff.txt >> review_prompt.txt

          # Try Anthropic Claude first
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "Trying Anthropic Claude API..."
            RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
              -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
              -H "anthropic-version: 2023-06-01" \
              -H "content-type: application/json" \
              -d @- << PAYLOAD
            {
              "model": "claude-3-5-sonnet-20241022",
              "max_tokens": 4096,
              "messages": [{
                "role": "user",
                "content": $(jq -Rs . < review_prompt.txt)
              }]
            }
          PAYLOAD
            )

            REVIEW=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')

            if [ -n "$REVIEW" ]; then
              echo "✅ Claude API succeeded"
              echo "AI_PROVIDER=Claude 3.5 Sonnet" >> ai_review.txt
              echo "$REVIEW" >> ai_review.txt
            else
              echo "⚠️ Claude API failed, trying OpenAI fallback..."
            fi
          fi

          # Fallback to OpenAI if Claude failed or unavailable
          if [ ! -f ai_review.txt ] && [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Using OpenAI GPT-4 API..."
            RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
              -H "content-type: application/json" \
              -d @- << PAYLOAD
            {
              "model": "gpt-4-turbo-preview",
              "max_tokens": 4096,
              "messages": [{
                "role": "user",
                "content": $(jq -Rs . < review_prompt.txt)
              }]
            }
          PAYLOAD
            )

            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI review unavailable"')
            echo "AI_PROVIDER=OpenAI GPT-4" > ai_review.txt
            echo "$REVIEW" >> ai_review.txt
          fi

          # If both failed, create fallback message
          if [ ! -f ai_review.txt ]; then
            echo "AI_PROVIDER=Unavailable" > ai_review.txt
            echo "AI code review is currently unavailable. Please ensure API keys are configured." >> ai_review.txt
          fi

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = 'AI code review unavailable.';
            let provider = 'Unknown';

            try {
              if (fs.existsSync('ai_review.txt')) {
                const content = fs.readFileSync('ai_review.txt', 'utf8');
                const lines = content.split('\n');

                // Extract provider from first line
                if (lines[0].startsWith('AI_PROVIDER=')) {
                  provider = lines[0].replace('AI_PROVIDER=', '');
                  review = lines.slice(1).join('\n');
                } else {
                  review = content;
                }
              }
            } catch (error) {
              console.log('Could not read AI review:', error);
            }

            const body = `## 🤖 AI Code Review (${provider})

            ${review}

            ---
            *This review is automated. Please use your judgment and consult with team members for critical decisions.*`;

            // Find existing AI review comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🤖 AI Code Review')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'cg-v1.110.26/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cg-v1.110.26/backend/**'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cg-v1.110.26/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_commonground
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cg-v1.110.26/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up test environment
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_commonground
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
          DEBUG: "true"
        run: |
          echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV
          echo "SECRET_KEY=$SECRET_KEY" >> $GITHUB_ENV
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "DEBUG=$DEBUG" >> $GITHUB_ENV

      - name: Run linting
        run: |
          ruff check . || true
          black --check . || true

      - name: Run type checking
        run: |
          mypy . --ignore-missing-imports || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_commonground
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
          DEBUG: "true"
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./cg-v1.110.26/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_BACKEND }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -f https://commonground-api.onrender.com/health; then
              echo "âś… Backend deployed successfully!"
              exit 0
            fi
            echo "Waiting for deployment... ($i/10)"
            sleep 10
          done
          echo "âš ď¸Ź Health check timeout - deployment may still be in progress"
          exit 0

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "âś… Backend deployed to production!"
          else
            echo "âťŚ Backend deployment failed"
          fi

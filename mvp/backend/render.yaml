services:
  - type: web
    name: commonground-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: mvp/backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health

{# CommonGround Email Styles - Inline CSS for maximum email client compatibility #}
<style type="text/css">
  /* Reset */
  body, table, td, p, a, li, blockquote {
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
  }
  table, td {
    mso-table-lspace: 0pt;
    mso-table-rspace: 0pt;
  }
  img {
    -ms-interpolation-mode: bicubic;
    border: 0;
    height: auto;
    line-height: 100%;
    outline: none;
    text-decoration: none;
  }

  /* Base */
  body {
    margin: 0 !important;
    padding: 0 !important;
    background-color: #F5F0E8;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #2D3A35;
  }

  /* Container */
  .email-container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #FFFFFF;
  }

  /* Header Variants */
  .header-sage {
    background: linear-gradient(135deg, #4A6C58 0%, #6B9B7A 100%);
  }
  .header-slate {
    background: linear-gradient(135deg, #475569 0%, #64748B 100%);
  }
  .header-amber {
    background: linear-gradient(135deg, #D4A574 0%, #C4956A 100%);
  }
  .header-purple {
    background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
  }

  /* Typography */
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #2D3A35;
    margin: 0 0 16px 0;
    line-height: 1.3;
  }
  h2 {
    font-size: 22px;
    font-weight: 600;
    color: #2D3A35;
    margin: 0 0 12px 0;
  }
  h3 {
    font-size: 18px;
    font-weight: 600;
    color: #2D3A35;
    margin: 0 0 8px 0;
  }
  p {
    margin: 0 0 16px 0;
    color: #2D3A35;
  }
  .text-secondary {
    color: #6B7B74;
  }
  .text-muted {
    color: #94A3A0;
    font-size: 14px;
  }
  .text-sage {
    color: #4A6C58;
  }
  .text-amber {
    color: #D4A574;
  }
  .text-slate {
    color: #475569;
  }
  .text-center {
    text-align: center;
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    text-align: center;
  }
  .btn-primary {
    background-color: #4A6C58;
    color: #FFFFFF !important;
  }
  .btn-secondary {
    background-color: #475569;
    color: #FFFFFF !important;
  }
  .btn-amber {
    background-color: #D4A574;
    color: #FFFFFF !important;
  }
  .btn-purple {
    background-color: #8B5CF6;
    color: #FFFFFF !important;
  }
  .btn-outline {
    background-color: transparent;
    border: 2px solid #4A6C58;
    color: #4A6C58 !important;
  }

  /* Cards */
  .card {
    background-color: #FFFBF5;
    border: 1px solid #E8E3DB;
    border-radius: 12px;
    padding: 24px;
    margin: 16px 0;
  }
  .card-highlight {
    background-color: #E8F0EC;
    border-color: #4A6C58;
  }
  .card-warning {
    background-color: #FEF7ED;
    border-color: #D4A574;
  }

  /* Feature List */
  .feature-list {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .feature-item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 12px;
    padding: 8px 0;
  }
  .feature-icon {
    width: 24px;
    height: 24px;
    margin-right: 12px;
    flex-shrink: 0;
  }

  /* Divider */
  .divider {
    height: 1px;
    background-color: #E8E3DB;
    margin: 24px 0;
  }

  /* Footer */
  .footer {
    background-color: #F5F0E8;
    padding: 24px 32px;
    text-align: center;
  }
  .footer p {
    margin: 0 0 8px 0;
    font-size: 14px;
    color: #6B7B74;
  }
  .footer a {
    color: #6B7B74;
    text-decoration: underline;
  }

  /* Utilities */
  .mb-0 { margin-bottom: 0; }
  .mb-8 { margin-bottom: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .p-16 { padding: 16px; }
  .p-24 { padding: 24px; }
  .p-32 { padding: 32px; }

  /* Expiry Notice */
  .expiry-notice {
    background-color: #FEF7ED;
    border-left: 4px solid #D4A574;
    padding: 12px 16px;
    font-size: 14px;
    color: #6B7B74;
    margin: 16px 0;
  }

  /* Stats Grid */
  .stats-grid {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }
  .stat-item {
    text-align: center;
    padding: 16px;
    background-color: #FFFBF5;
    border-radius: 8px;
    flex: 1;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #4A6C58;
    display: block;
  }
  .stat-label {
    font-size: 12px;
    color: #6B7B74;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Responsive */
  @media only screen and (max-width: 600px) {
    .email-container {
      width: 100% !important;
    }
    .p-32 {
      padding: 20px !important;
    }
    h1 {
      font-size: 24px !important;
    }
    .stats-grid {
      flex-direction: column;
    }
  }
</style>
